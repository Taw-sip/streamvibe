<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>StreamVibe — Live Sports TV</title>
  <meta name="description"
    content="Watch 120+ live Sports channels from around the world — Cricket, Football, Combat, and Global Sports Networks. Free live streaming." />

  <!-- PWA Meta -->
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="StreamVibe" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="StreamVibe" />
  <meta name="msapplication-TileColor" content="#0a0a0f" />

  <!-- Open Graph -->
  <meta property="og:title" content="StreamVibe — Live Sports TV" />
  <meta property="og:description" content="Watch 120+ live Sports channels free." />
  <meta property="og:type" content="website" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Header -->
  <header class="header" id="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M21 7L13 7M21 12L8 12M21 17L3 17" stroke="url(#grad1)" stroke-width="2.2" stroke-linecap="round" />
            <circle cx="5" cy="7" r="2.5" fill="url(#grad1)" />
            <circle cx="10" cy="12" r="2.5" fill="url(#grad2)" />
            <defs>
              <linearGradient id="grad1" x1="0" y1="0" x2="24" y2="0" gradientUnits="userSpaceOnUse">
                <stop stop-color="#a78bfa" />
                <stop offset="1" stop-color="#f472b6" />
              </linearGradient>
              <linearGradient id="grad2" x1="0" y1="0" x2="24" y2="0" gradientUnits="userSpaceOnUse">
                <stop stop-color="#f472b6" />
                <stop offset="1" stop-color="#fb923c" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="logo-text">Stream<span class="logo-accent">Vibe</span></span>
      </div>

      <div class="header-center">
        <div class="search-bar">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2" />
            <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
          <input type="text" id="searchInput" placeholder="Search channels..." autocomplete="off" />
          <button class="search-clear" id="searchClear" aria-label="Clear search">✕</button>
        </div>
      </div>

      <div class="header-right">
        <span class="live-badge">
          <span class="live-dot"></span>LIVE
        </span>
        <span class="channel-count" id="channelCount">— Channels</span>
        <!-- PWA install button (hidden until prompt fires) -->
        <button class="install-btn" id="installBtn" aria-label="Install App" title="Install StreamVibe"
          style="display:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          <span>Install</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main layout -->
  <div class="app-layout">

    <!-- Sidebar: categories + channel list -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">

        <!-- Sidebar Search (Only visible in mobile view) -->
        <div class="sidebar-search-section" id="sidebarSearchSection">
          <div class="search-bar">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none">
              <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2" />
              <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            <input type="text" id="sidebarSearchInput" placeholder="Search channels..." autocomplete="off" />
            <button class="search-clear" id="sidebarSearchClear" aria-label="Clear search">✕</button>
          </div>
        </div>

        <!-- Category pills -->
        <div class="category-section">
          <h2 class="sidebar-section-title">Categories</h2>
          <div class="category-pills" id="categoryPills">
            <!-- Filled by JS -->
          </div>
        </div>

        <!-- Channel list -->
        <div class="channel-list-section">
          <h2 class="sidebar-section-title channels-title">
            <span id="channelListLabel">All Channels</span>
            <span class="count-badge" id="listCountBadge"></span>
          </h2>
          <div class="channel-list" id="channelList">
            <!-- Filled by JS -->
          </div>
        </div>

      </div>
    </aside>

    <!-- Main content: player + info -->
    <main class="main-content" id="mainContent">

      <!-- Player area -->
      <section class="player-section" id="playerSection">
        <div class="player-wrap" id="playerWrap">
          <div class="player-placeholder" id="playerPlaceholder">
            <div class="placeholder-inner">
              <div class="placeholder-icon">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="10" stroke="rgba(167,139,250,0.3)" stroke-width="1.5" />
                  <path d="M10 8l6 4-6 4V8z" fill="rgba(167,139,250,0.5)" />
                </svg>
              </div>
              <p class="placeholder-title">Select a channel to start watching</p>
              <p class="placeholder-subtitle">Choose from 120+ live sports channels across categories</p>
            </div>
          </div>
          <video id="videoPlayer" controls playsinline style="display:none;"></video>
          <button id="pipBtn" class="pip-btn-overlay" title="Picture-in-Picture" aria-label="Picture-in-Picture"
            style="display:none;">
            <svg id="pipIconEnter" width="20" height="20" viewBox="0 0 24 24" fill="none">
              <rect x="2" y="4" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.8" fill="none" />
              <rect x="12" y="11" width="8" height="5" rx="1.2" fill="currentColor" />
              <path d="M7 9L4 6M4 6h3M4 6v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
            <svg id="pipIconExit" width="20" height="20" viewBox="0 0 24 24" fill="none" style="display:none">
              <rect x="2" y="4" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.8" fill="none" />
              <rect x="12" y="11" width="8" height="5" rx="1.2" fill="currentColor" />
              <path d="M4 9l3-3M7 9H4M7 9V6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
          </button>
          <div class="player-overlay" id="playerOverlay" style="display:none;">
            <div class="channel-on-screen" id="channelOnScreen">
              <img id="overlayLogo" src="" alt="" />
              <div>
                <div class="overlay-name" id="overlayName"></div>
                <div class="overlay-group" id="overlayGroup"></div>
              </div>
            </div>
          </div>
          <div class="loading-ring" id="loadingRing" style="display:none;">
            <div class="ring"></div>
          </div>
          <div class="error-overlay" id="errorOverlay" style="display:none;">
            <div class="error-inner">
              <div class="error-icon">⚠️</div>
              <p class="error-title">Stream Unavailable</p>
              <p class="error-subtitle">This channel may be temporarily offline or geo-restricted.</p>
              <button class="retry-btn" id="retryBtn">Try Again</button>
            </div>
          </div>
          <!-- Now playing info bar (overlaid over video) -->
          <div class="now-playing-bar" id="nowPlayingBar" style="display:none;">
            <div class="npb-left">
              <img class="npb-logo" id="npbLogo" src="" alt="" />
              <div class="npb-info">
                <div class="npb-name" id="npbName"></div>
                <div class="npb-group" id="npbGroup"></div>
              </div>
            </div>
            <div class="npb-right">
              <span class="npb-live"><span class="live-dot small"></span>LIVE</span>
            </div>
          </div>
        </div>
      </section>

    </main>
  </div>

  <!-- Mobile drawer toggle -->
  <button class="mobile-sidebar-toggle" id="mobileSidebarToggle" aria-label="Toggle channel list">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <rect x="3" y="6" width="18" height="2" rx="1" fill="currentColor" />
      <rect x="3" y="11" width="14" height="2" rx="1" fill="currentColor" />
      <rect x="3" y="16" width="10" height="2" rx="1" fill="currentColor" />
    </svg>
  </button>

  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
  <script src="channels.js"></script>
  <script src="app.js"></script>
  <script src="pip.js"></script>
  <script src="pwa.js"></script>
</body>

</html>
